<!DOCTYPE html>
<html>

<head>
    <title>Justify Content</title>
</head>

<body>
    <h1>
        <center>Justify Content</center>
        <hr>
    </h1>
    <div>
        <h1>hi</h1>
        <h1>hi</h1>
    </div>

    <style>
        h1 {

        div {

            justify-content: center;

        }
    </style>

</body>

</html>
