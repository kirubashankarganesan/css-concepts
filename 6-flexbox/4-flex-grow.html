<!DOCTYPE html>
<html>

<head>
    <title>Flex Grow</title>
</head>

<body>
    <h1>
        <center>Flex Grow</center>
        <hr>
    </h1>
    <div>
        <h1>hi</h1>
        <h2>bye</h2>
    </div>

    <style>
        div {
            display: flex;
            padding: 10px;
            ;
            background-color: blue;
        }

        h1 {
            background-color: rgb(252, 5, 236);
            color: red;
            flex-grow: 1;
            /* divide the box into same size */
            margin: 0px;
            padding: 0px;
        }

        h2 {
            background-color: rgb(19, 197, 229);
            color: rgb(98, 14, 232);
            flex-grow: 1;
            margin: 0px;
            padding: 0px;
        }
    </style>

</body>

</html>
