<!DOCTYPE html>
<html>

<head>
    <title>Inline Display</title>
</head>

<body>
    <h1>
        <center>Inline Display</center>
        <hr>
    </h1>
    <!-- inline- same line, fill the size of the content,cannot set width and height
inline block- same line,same line, fill the size of the content,can set width and height 
block - differnt line,fill size of the entire width we can set heigth and width
none - this will hide the element from the html  -->
    <h1>Hi</h1>
    <h2>Bye</h2>

    <style>
        h1,
        h2 {
            display: inline;
            background-color: black;
            color: red;
            margin: 5px;
        }
    </style>

</body>

</html>
