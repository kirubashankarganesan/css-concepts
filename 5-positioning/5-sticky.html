<!DOCTYPE html>
<html>

<head>
    <title>Sticky Position</title>
    <style>
        h1 {
            position: sticky;
            top: 0;
            background-color: black;
            color: white;
            padding: 10px;
        }
    </style>
</head>

<body>
    <h1>
        <center>Sticky Position</center>
        <hr>
    </h1>
    <h1>Sticky Header</h1>

    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit...
    </p>

    <p>
        Scroll down to see sticky effect.
    </p>

    <p style="height:1500px;"></p>

    <!-- when it comes to 0px then i will be converted to fixed  -->
</body>

</html>
