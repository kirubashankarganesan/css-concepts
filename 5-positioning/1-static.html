<body>
    <h1>
        <center>Static Position</center>

    <div></div>
    <!-- The CSS positioning property controls how elements are placed on a webpage.
    Static: The default position. Elements follow the normal document flow.
    Relative: Positions the element relative to its normal position.
    Absolute: Positions the element relative to its nearest positioned ancestor.
    Fixed: Positions the element relative to the viewport and remains fixed during scrolling.
    Sticky: A hybrid between relative and fixed positioning; it behaves like relative until a certain scroll position is
    reached,
    then acts like fixed.
    💡 Simplified Version (Easy to Understand):
    CSS positioning decides where elements appear on a webpage.
    Static: Default — stays where it normally appears.
    Relative: Moves a little from its normal place.
    Absolute: Stays at a fixed spot inside another element.
    Fixed: Stays in the same place even when you scroll.
    Sticky: Acts normal at first but sticks to the screen when you scroll. -->
