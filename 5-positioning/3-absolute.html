<!DOCTYPE html>
<html>

<head>
    <title>Absolute Position</title>
    <style>
        .container {
            position: relative;
            margin-top: 200px;
            margin-left: 100px;
            width: 200px;
            height: 200px;
            border: 2px dashed black;
        }

        .box {
            position: absolute;
            left: 50px;
            top: 50px;
            background-color: red;
            color: white;
            padding: 5px;
        }
    </style>
</head>

<body>
    <h1>
        <center>Absolute Position</center>
        <hr>
    </h1>
    <div class="container">
        <h1 class="box">Hi</h1>
    </div>

    <!-- when parent is static then it consider the whole display 
  whern it is relative or absolute then it used to obey the condition  -->


</body>

</html>
