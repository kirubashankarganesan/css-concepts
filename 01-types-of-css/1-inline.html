<html>
  <head>
    <title>Inline css</title>
    <link rel="icon" href="./a.jpg" />
  </head>

  <body>
    <h1>
      <center>Inline css</center>
      <hr />
    </h1>
    <!-- INLINE CSS -->
    <h1 style="color: red; background-color: black">heading</h1>
    <!-- style is attribute and style indicate this is for css color indicate fonnt color and background indicated for background color -->
    <!-- color is key and red is value -->
    <!--This is ***INLINE CSS*** because we gave the style in same line -->

    <!-- examples -->
    <h1 style="color: black; background-color: red">apple</h1>
    <h1 style="color: rgb(96, 27, 175); background-color: rgb(172, 14, 66)">
      orange
    </h1>
    <h1 style="color: rgb(187, 22, 173); background-color: rgb(255, 136, 0)">
      mango
    </h1>
  </body>
</html>
