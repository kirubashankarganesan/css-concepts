<!DOCTYPE html>
<html>

<head>
    <title>Z-Index</title>
</head>

<body>
    <h1>
        <center>Z-Index</center>
        <hr>
    </h1>
    <!-- z-index → control which element comes on top -->

    <div class="one"></div>
    <div class="two"></div>

    <style>
        .one {
            width: 100px;
            height: 100px;
            background-color: red;
            position: absolute;
            z-index: 1;
        }

        .two {
            width: 100px;
            height: 100px;
            background-color: black;
            position: absolute;
            left: 30px;
            z-index: 2;
        }
    </style>

    <!-- higher z-index comes on top -->

</body>

</html>
