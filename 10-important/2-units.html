<!doctype html>
<html>
  <head>
    <title>Units</title>
  </head>

  <body>
    <h1>
      <center>Units</center>
      <hr />
    </h1>
    <!-- units → define size -->

    <div class="box1">px</div>
    <div class="box2">%</div>
    <div class="box3">vh</div>

    <style>
      .box1 {
        width: 200px;
        /* fixed size */
        background-color: red;
      }

      .box2 {
        width: 50%;
        /* relative to parent */
        background-color: blue;
      }

      .box3 {
        height: 50vh;
        /* 50% of screen height */
        background-color: green;
      }
    </style>

    <!-- px = fixed -->
    <!-- % = relative -->
    <!-- vh = screen height -->
    <!-- vw = screen width -->
  </body>
</html>
