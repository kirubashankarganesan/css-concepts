<!DOCTYPE html>
<html>

<head>
    <title>Grid Gap</title>
</head>

<body>
    <h1>
        <center>Grid Gap</center>
        <hr>
    </h1>
    <!-- gap → space between items -->

    <div class="container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>

    <style>
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            /* spacing */
        }

        .container div {
            background-color: red;
            color: white;
            padding: 10px;
        }
    </style>

</body>

</html>
