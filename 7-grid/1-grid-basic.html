<!doctype html>
<html>
  <head>
    <title>Grid Basic</title>
  </head>

  <body>
    <h1>
      <center>Grid Basic</center>
      <hr />
    </h1>
    <!-- display: grid → start grid layout -->

    <div class="container">
      <div>1</div>
      <div>2</div>
      <div>3</div>
    </div>

    <style>
      .container {
        display: grid;
        /* enable grid */
        background-color: lightgray;
      }

      .container div {
        background-color: black;
        color: white;
        margin: 5px;
        padding: 10px;
      }
    </style>
  </body>
</html>
