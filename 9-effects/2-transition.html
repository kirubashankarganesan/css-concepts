<!DOCTYPE html>
<html>
<head>
    <title>Transition</title>
</head>
<body>
    <h1>
        <center>Transition</center>
        <hr>
    </h1>
<!-- transition → smooth change effect -->

<div class="box"></div>

<style>
.box{
    width: 100px;
    height: 100px;
    background-color: black;
    transition: 0.5s; /* smooth animation */
}

/* hover triggers transition */
.box:hover{
    background-color: red;
    width: 150px;
}
</style>

</body>
</html>
