<!DOCTYPE html>
<html>
<head>
    <title>Hover Effect</title>
</head>
<body>
    <h1>
        <center>Hover Effect</center>
        <hr>
    </h1>
<!-- hover → change style when mouse over -->

<button>Hover me</button>

<style>
button{
    padding: 10px;
    background-color: black;
    color: white;
}

/* when mouse comes on button */
button:hover{
    background-color: red;
}
</style>

</body>
</html>
