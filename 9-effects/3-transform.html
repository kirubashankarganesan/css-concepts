<!doctype html>
<html>
  <head>
    <title>Transform</title>
  </head>
  <body>
    <h1>
      <center>Transform</center>
      <hr />
    </h1>
    <!-- transform → move, rotate, scale element -->

    <div class="box"></div>

    <style>
      .box {
        width: 100px;
        height: 100px;
        background-color: blue;
        margin: 50px;
        transition: 0.5s;
      }

      /* transform examples */
      .box:hover {
        transform: scale(1.2); /* increase size */
        /* transform: rotate(45deg); */
        /* transform: translateX(50px); */
      }
    </style>
  </body>
</html>
