<html>
  <head>
    <title>Margin</title>
  </head>

  <body>
    <h1>
      <center>Margin</center>
      <hr />
    </h1>
    <style>
      h1 {
        margin: 200px;
        background-color: black;
        color: brown;
      }

      h2 {
        margin-right: 100px;
        background-color: black;
        color: rgb(61, 42, 165);
      }

      h3 {
        margin-left: 100px;
        background-color: black;
        color: rgb(10, 177, 38);
      }

      h4 {
        margin-bottom: 100px;
        background-color: black;
        color: rgb(91, 11, 128);
      }

      /* margin is size we can change accordingly */
    </style>
    <h1>hello</h1>
    <h2>hello</h2>
    <h3>hello</h3>
    <h4>hello</h4>
  </body>
</html>
