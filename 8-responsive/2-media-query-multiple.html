<!doctype html>
<html>
  <head>
    <title>Multiple Conditions</title>
  </head>

  <body>
    <h1>
      <center>Multiple Conditions</center>
      <hr />
    </h1>
    <h1>hi</h1>

    <style>
      h1 {
        color: blue;
      }

      @media print and (orientation: landscape) {
        h1 {
          color: red;
        }
      }
    </style>

    <!-- and is used to give multiple condition -->
    <!-- when it comes to page printing then color changed -->
    <!-- orientation when landscape then color change -->
  </body>
</html>
