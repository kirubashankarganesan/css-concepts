<!doctype html>
<html>
  <head>
    <title>Media Query Basic</title>
  </head>

  <body>
    <h1>
      <center>Media Query Basic</center>
      <hr />
    </h1>
    <!-- A media query is used to change styles based on condition -->

    <!-- A responsive website adjusts its layout to look good and function well on different devices such as desktops, 
 tablets, and smartphones. It uses design techniques to ensure optimal viewing and usability across various screen sizes. 
 This adaptability enhances the user experience by accommodating diverse devices. 
 For example, TripAdvisor is a responsive website. -->

    <!-- A media query is a CSS technique used to apply styles based on characteristics such as screen size, device type, or other features. 
  It enables the creation of responsive web designs by adjusting layouts for optimal display on various devices and screen sizes. -->

    <h1>hi</h1>

    <style>
      h1 {
        color: blue;
      }

      @media print {
        h1 {
          color: red;
        }
      }
    </style>

    <!-- when it comes to page printing then color changed -->
  </body>
</html>
